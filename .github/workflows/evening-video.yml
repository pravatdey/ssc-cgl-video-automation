name: Evening Video (English/GA)

# 5:00 PM IST = 11:30 UTC
on:
  schedule:
    - cron: '30 11 * * *'
  workflow_dispatch:
    inputs:
      part_number:
        description: 'Part number (empty = next evening topic)'
        required: false
        default: ''
      test_mode:
        description: 'Upload as private?'
        required: false
        default: 'false'

permissions:
  contents: write

concurrency:
  group: cgl-progress           # serialize with morning job to avoid progress.json clashes
  cancel-in-progress: false

jobs:
  generate-and-upload:
    runs-on: ubuntu-latest
    timeout-minutes: 90
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      - name: Setup YouTube credentials
        run: |
          mkdir -p config
          echo '${{ secrets.YOUTUBE_CLIENT_SECRETS }}' > config/client_secrets.json
          echo '${{ secrets.YOUTUBE_TOKEN }}' > config/youtube_token.json

      - name: Generate and upload EVENING video
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: |
          ARGS="--slot evening"
          if [ -n "${{ github.event.inputs.part_number }}" ]; then
            ARGS="--part ${{ github.event.inputs.part_number }}"
          fi
          if [ "${{ github.event.inputs.test_mode }}" = "true" ]; then
            ARGS="$ARGS --test"
          fi
          python main.py $ARGS

      - name: Save progress to repo
        if: success()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase --autostash || true
          git add progress.json
          git diff --cached --quiet || git commit -m "Evening: update progress.json"
          git push

      - name: Upload artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: evening-output-${{ github.run_number }}
          path: |
            output/videos/
            output/thumbnails/
            output/scripts/
            logs/
          retention-days: 7
