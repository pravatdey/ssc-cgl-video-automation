# ============================================================
# SSC CGL COMPLETE PREPARATION SYLLABUS
# 4 Subjects | 320 video lessons | Hindi narration
#
# SLOT SYSTEM:
#   slot: "morning"  -> released at 5:00 AM IST (heavy thinking subjects)
#                       Reasoning + Quantitative Aptitude
#   slot: "evening"  -> released at 5:00 PM IST (memory/language subjects)
#                       English + General Awareness
#
# The scheduler walks two independent sequences:
#   morning_next  : next morning-slot part to publish
#   evening_next  : next evening-slot part to publish
#
# Part numbering:
#   1   - 90   General Intelligence & Reasoning   (morning)
#   91  - 180  Quantitative Aptitude              (morning)
#   181 - 250  English Comprehension              (evening)
#   251 - 320  General Awareness (GK/GS)          (evening)
# ============================================================
syllabus:
  name: "SSC CGL Complete Preparation"
  total_parts: 320

  sections:
